<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chytrá váha</title>
  <style>
    /* Základní reset a stylování těla stránky */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f0;
    }

    #app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Styly pro karty (Login/Registrace) */
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #1a6b3a;
      margin-bottom: 8px;
      font-size: 28px;
    }

    p {
      color: #666;
      margin-bottom: 24px;
    }

    /* Formulářové prvky */
    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #1a6b3a;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #1a6b3a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #145230;
    }

    .link {
      text-align: center;
      margin-top: 16px;
      color: #666;
    }

    .link a {
      color: #1a6b3a;
      cursor: pointer;
      text-decoration: none;
      font-weight: bold;
    }

    .error {
      color: #c0392b;
      margin-bottom: 12px;
      font-size: 14px;
      display: none;
    }

    /* Dashboard a vizualizace dat */
    .dashboard {
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .weight-display {
      background: #1a6b3a;
      color: white;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      margin-bottom: 24px;
    }

    .weight-display .grams {
      font-size: 64px;
      font-weight: bold;
    }

    .weight-display .label {
      font-size: 16px;
      opacity: 0.8;
    }

    /* Nutriční hodnoty a progress bary */
    .nutrition-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .nutrition-card h3 {
      color: #333;
      margin-bottom: 16px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .bar-label {
      width: 100px;
      font-size: 14px;
      color: #666;
    }

    .bar-track {
      flex: 1;
      background: #f0f0f0;
      border-radius: 99px;
      height: 12px;
    }

    .bar-fill {
      height: 12px;
      border-radius: 99px;
      transition: width 0.5s;
    }

    .bar-value {
      width: 60px;
      font-size: 13px;
      color: #333;
      text-align: right;
    }

    .logout-btn {
      background: transparent;
      color: #c0392b;
      border: 2px solid #c0392b;
      width: auto;
      padding: 8px 16px;
      font-size: 14px;
    }

    .logout-btn:hover {
      background: #c0392b;
      color: white;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    // ═══════════════════════════════════════
    // SPRÁVA TOKENU (AUTORIZACE)
    // ═══════════════════════════════════════
    // Načtení JWT tokenu z lokálního úložiště prohlížeče
    const getToken = () => localStorage.getItem('token');
    // Uložení tokenu po úspěšném přihlášení
    const saveToken = t => localStorage.setItem('token', t);
    // Odhlášení: smazání tokenu a přesměrování na login
    const logout = () => { localStorage.removeItem('token'); router(); };

    // ═══════════════════════════════════════
    // POMOCNÁ FUNKCE PRO API POŽADAVKY
    // ═══════════════════════════════════════
    async function api(path, options = {}) {
      const res = await fetch(`/api/${path}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`, // Přidání tokenu do hlavičky pro chráněné routy
          ...options.headers
        }
      });
      // Pokud server vrátí 401 (neautorizováno), automaticky odhlásíme uživatele
      if (res.status === 401) { logout(); return null; }
      return res.json();
    }

    // ═══════════════════════════════════════
    // JEDNODUCHÝ SMĚROVAČ (ROUTER)
    // ═══════════════════════════════════════
    // Rozhoduje, zda zobrazit Dashboard nebo Login na základě přítomnosti tokenu
    function router() {
      const app = document.getElementById('app');
      if (getToken()) {
        renderDashboard(app);
      } else {
        renderLogin(app);
      }
    }

    // ═══════════════════════════════════════
    // STRÁNKA PRO PŘIHLÁŠENÍ
    // ═══════════════════════════════════════
    function renderLogin(app) {
      app.innerHTML = `
    <div class="card">
      <h1>🍽️ Chytrá váha</h1>
      <p>Přihlaste se ke svému účtu</p>
      <div class="error" id="err"></div>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Heslo" />
      <button onclick="doLogin()">Přihlásit se</button>
      <div class="link">Nemáte účet? <a onclick="renderRegisterPage()">Registrovat se</a></div>
    </div>
  `;
    }

    // Logika odeslání přihlašovacích údajů
    async function doLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('err');

      const data = await api('auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });

      if (data?.token) {
        saveToken(data.token);
        router();
      } else {
        err.style.display = 'block';
        err.textContent = data?.error || 'Chyba přihlášení';
      }
    }

    // ═══════════════════════════════════════
    // STRÁNKA PRO REGISTRACI
    // ═══════════════════════════════════════
    function renderRegisterPage() {
      const app = document.getElementById('app');
      app.innerHTML = `
    <div class="card">
      <h1>🍽️ Registrace</h1>
      <p>Vytvořte si nový účet</p>
      <div class="error" id="err"></div>
      <input type="text" id="name" placeholder="Jméno" />
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Heslo" />
      <button onclick="doRegister()">Registrovat se</button>
      <div class="link">Máte účet? <a onclick="router()">Přihlásit se</a></div>
    </div>
  `;
    }

    // Logika vytvoření nového účtu
    async function doRegister() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('err');

      const data = await api('auth/register', {
        method: 'POST',
        body: JSON.stringify({ name, email, password })
      });

      if (data?.token) {
        saveToken(data.token);
        router();
      } else {
        err.style.display = 'block';
        err.textContent = data?.error || 'Chyba registrace';
      }
    }

    // ═══════════════════════════════════════
    // HLAVNÍ PŘEHLED (DASHBOARD)
    // ═══════════════════════════════════════
    async function renderDashboard(app) {
      app.innerHTML = `
    <div class="dashboard">
      <div class="header">
        <h1 style="color:#1a6b3a">🍽️ Chytrá váha</h1>
        <button class="logout-btn" onclick="logout()">Odhlásit</button>
      </div>

      <div class="weight-display">
        <div class="label">Aktuální váha</div>
        <div class="grams" id="weight-display">-- g</div>
        <div class="label" id="weight-status">Čekám na data z váhy...</div>
      </div>

      <div class="nutrition-card">
        <h3>📊 Dnešní příjem</h3>
        <div class="bar-row">
          <div class="bar-label">Kalorie</div>
          <div class="bar-track"><div class="bar-fill" id="bar-cal" style="width:0%;background:#e67e22"></div></div>
          <div class="bar-value" id="val-cal">0 / 2000</div>
        </div>
        <div class="bar-row">
          <div class="bar-label">Bílkoviny</div>
          <div class="bar-track"><div class="bar-fill" id="bar-pro" style="width:0%;background:#2980b9"></div></div>
          <div class="bar-value" id="val-pro">0 / 150g</div>
        </div>
        <div class="bar-row">
          <div class="bar-label">Sacharidy</div>
          <div class="bar-track"><div class="bar-fill" id="bar-carb" style="width:0%;background:#27ae60"></div></div>
          <div class="bar-value" id="val-carb">0 / 250g</div>
        </div>
        <div class="bar-row">
          <div class="bar-label">Tuky</div>
          <div class="bar-track"><div class="bar-fill" id="bar-fat" style="width:0%;background:#8e44ad"></div></div>
          <div class="bar-value" id="val-fat">0 / 65g</div>
        </div>
      </div>
    </div>
  `;

      // Pravidelná aktualizace hmotnosti (Polling)
      // Každých 500ms se zeptáme serveru na poslední hodnotu z váhy
      setInterval(async () => {
        const data = await api('weight');
        if (data?.grams !== null && data?.grams !== undefined) {
          document.getElementById('weight-display').textContent = data.grams + ' g';
          document.getElementById('weight-status').textContent = 'Váha stabilizována ✓';
        }
      }, 500);
    }

    // Spuštění aplikace při načtení stránky
    router();
  </script>
</body>

</html>
